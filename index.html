<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocentePro Honduras - Asistente Pedagógico</title>
    
    <!-- Scripts Base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Librerías de Exportación -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }

        .scroll-container {
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            margin: 1rem 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .markdown-body th {
            background-color: #f1f5f9;
            color: #4f46e5;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0.75rem;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        .markdown-body td {
            padding: 0.75rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
            color: #334155;
        }

        .markdown-body tr:last-child td {
            border-bottom: none;
        }

        .markdown-body tr:nth-child(even) {
            background-color: #f8fafc;
        }

        #error-boundary {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>
    
    <div id="error-boundary">
        <h1 class="text-2xl font-black text-slate-800 mb-4">¡UPS! ALGO SALIÓ MAL</h1>
        <p class="text-slate-500 mb-6">La aplicación encontró un error inesperado al cargar.</p>
        <button onclick="location.reload()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold">REINTENTAR</button>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================================
        // CONFIGURACIÓN DE FIREBASE
        // Reemplaza los valores de abajo con los de tu proyecto Firebase
        // (Consola Firebase → Configuración del proyecto → Tu aplicación)
        // ============================================================
        const firebaseConfig = {
            apiKey:            "AIzaSyArJl_HnCK2WsxjdLEKDtRTIYqIReImffM",
            authDomain:        "ia-bubu-y-dudu.firebaseapp.com",
            projectId:         "ia-bubu-y-dudu",
            storageBucket:     "ia-bubu-y-dudu.firebasestorage.app",
            messagingSenderId: "516957357560",
            appId:             "1:516957357560:web:8213a495ae5af7a204820d"
        };

        // ============================================================
        // CLAVE DE API DE GEMINI
        // Reemplaza con tu clave de Google AI Studio
        // https://aistudio.google.com/app/apikey
        // ============================================================
        const GEMINI_API_KEY = "AIzaSyANQ5Mmf5uEpI8YdeHjbyb_qlDhG-ZfZEE";

        const appId = 'docente-pro-honduras-final';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('chat');
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [exporting, setExporting] = useState(false);
            const [teacherProfile, setTeacherProfile] = useState({ name: '', vision: '' });
            const [savedDocs, setSavedDocs] = useState([]);
            const [notification, setNotification] = useState(null);
            
            const scrollRef = useRef(null);

            // Auth anónima
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                    } else {
                        auth.signInAnonymously();
                    }
                });
                return () => unsubscribe();
            }, []);

            // Sincronización con Firestore
            useEffect(() => {
                if (!user) return;

                const profileRef = db
                    .collection('artifacts').doc(appId)
                    .collection('users').doc(user.uid)
                    .collection('settings').doc('profile');

                profileRef.get().then(doc => doc.exists && setTeacherProfile(doc.data()));

                const docsRef = db
                    .collection('artifacts').doc(appId)
                    .collection('users').doc(user.uid)
                    .collection('generated_docs');

                const unsubscribe = docsRef.onSnapshot(snap => {
                    setSavedDocs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsubscribe();
            }, [user]);

            // Auto-scroll al último mensaje
            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages, isTyping]);

            const showToast = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            const handleSend = async () => {
                if (!inputText.trim()) return;
                const userQuery = inputText;
                setMessages(prev => [...prev, { role: 'user', text: userQuery }]);
                setInputText('');
                setIsTyping(true);

                try {
                    const sysPrompt = `Eres un asistente experto para una subdirectora docente en Honduras. 
                    CONTEXTO: DCNB Honduras Segundo Ciclo (4to, 5to y 6to grado). 
                    REGLA: Si te piden una planificación, usa 6 columnas: Objetivos, Contenidos, Actividades, Metodología, Recursos, Evaluación.
                    Si piden jornalización, usa 3 columnas: Objetivos, Contenidos, Evaluación.
                    Usa tablas de Markdown siempre.`;

                    const res = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: sysPrompt }] }
                            })
                        }
                    );
                    const data = await res.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Lo siento, hubo un error de respuesta.";
                    setMessages(prev => [...prev, { role: 'ai', text: aiText }]);
                } catch (e) {
                    showToast("Error de conexión");
                } finally {
                    setIsTyping(false);
                }
            };

            const handleDownload = async (format, content) => {
                setExporting(true);
                try {
                    const title = "DocentePro_Honduras_Oficial";
                    const rows = content.split('\n')
                        .filter(l => l.includes('|') && !l.includes('---|'))
                        .map(l => l.split('|').filter(c => c.trim() !== '').map(c => c.trim()));

                    if (format === 'WORD' && rows.length > 0) {
                        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, PageOrientation } = window.docx;
                        
                        const docTable = new Table({
                            width: { size: 100, type: WidthType.PERCENTAGE },
                            rows: rows.map((r, i) => new TableRow({
                                children: r.map(c => new TableCell({
                                    shading: i === 0 ? { fill: "f1f5f9" } : undefined,
                                    children: [new Paragraph({ children: [new TextRun({ text: c, bold: i === 0, size: 18 })] })]
                                }))
                            }))
                        });

                        const docObj = new Document({
                            sections: [{
                                properties: { page: { orientation: PageOrientation.LANDSCAPE } },
                                children: [
                                    new Paragraph({ children: [new TextRun({ text: title.toUpperCase(), bold: true, size: 28 })], spacing: { after: 300 } }),
                                    docTable
                                ]
                            }]
                        });

                        const blob = await Packer.toBlob(docObj);
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `${title}.docx`;
                        a.click();
                        setTimeout(() => URL.revokeObjectURL(url), 100);
                    } else {
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF('l', 'mm', 'a4');
                        pdf.setFontSize(14);
                        pdf.text(title, 15, 15);
                        pdf.setFontSize(9);
                        const splitText = pdf.splitTextToSize(content.replace(/\|/g, ' '), 270);
                        pdf.text(splitText, 15, 25);
                        pdf.save(`${title}.pdf`);
                    }
                } catch (e) {
                    showToast("Error al exportar");
                } finally {
                    setExporting(false);
                }
            };

            const renderTable = (lines, key) => {
                const rows = lines
                    .filter(l => !l.includes('---|'))
                    .map(l => l.split('|').filter(c => c.trim() !== '').map(c => c.trim()));
                if (rows.length === 0) return null;
                return (
                    <div key={key} className="my-4 overflow-x-auto border border-slate-200 rounded-2xl bg-white shadow-sm">
                        <table className="min-w-full divide-y divide-slate-100 text-[10px] md:text-xs">
                            <thead className="bg-indigo-50/50">
                                <tr>
                                    {rows[0].map((h, i) => (
                                        <th key={i} className="px-3 py-3 text-left font-black text-indigo-600 uppercase border-r last:border-0">{h}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                                {rows.slice(1).map((r, i) => (
                                    <tr key={i}>
                                        {r.map((c, j) => (
                                            <td key={j} className="px-3 py-2 border-r last:border-0 align-top text-slate-600">{c}</td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                );
            };

            const formatMessage = (text) => {
                const lines = text.split('\n');
                const result = [];
                let currentTable = [];
                lines.forEach((line, i) => {
                    if (line.trim().startsWith('|')) {
                        currentTable.push(line);
                    } else {
                        if (currentTable.length > 0) {
                            result.push(renderTable(currentTable, i));
                            currentTable = [];
                        }
                        if (line.trim()) {
                            result.push(
                                <p key={i} className="mb-2 text-sm text-slate-700 leading-relaxed">{line}</p>
                            );
                        }
                    }
                });
                if (currentTable.length > 0) result.push(renderTable(currentTable, 'last'));
                return result;
            };

            const saveDoc = (content) => {
                if (!user) return;
                db.collection('artifacts').doc(appId)
                  .collection('users').doc(user.uid)
                  .collection('generated_docs')
                  .add({
                      title: `Plan_${new Date().toLocaleDateString()}`,
                      content: content,
                      createdAt: firebase.firestore.FieldValue.serverTimestamp()
                  });
                showToast("Guardado ✓");
            };

            const deleteDoc = (docId) => {
                db.collection('artifacts').doc(appId)
                  .collection('users').doc(user.uid)
                  .collection('generated_docs')
                  .doc(docId).delete();
            };

            const saveProfile = () => {
                if (!user) return;
                db.collection('artifacts').doc(appId)
                  .collection('users').doc(user.uid)
                  .collection('settings').doc('profile')
                  .set(teacherProfile);
                showToast("Perfil Guardado ✓");
            };

            return (
                <div className="flex h-screen flex-col bg-slate-50 md:flex-row overflow-hidden relative">

                    {/* Toast de notificación */}
                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[999] bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-black shadow-2xl">
                            {notification}
                        </div>
                    )}

                    {/* Sidebar — solo escritorio */}
                    <aside className="hidden md:flex w-64 bg-white border-r border-slate-200 flex-col p-8">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white">
                                <lucide-icon name="sparkles" size="24"></lucide-icon>
                            </div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tighter">DocentePro</h1>
                        </div>
                        <nav className="space-y-2">
                            {[
                                { id: 'chat',    label: 'Asistente' },
                                { id: 'docs',    label: 'Biblioteca' },
                                { id: 'profile', label: 'Perfil' }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm transition-colors ${
                                        activeTab === tab.id
                                            ? 'bg-indigo-600 text-white'
                                            : 'text-slate-400 hover:bg-slate-50'
                                    }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* Área principal */}
                    <main className="flex-1 flex flex-col min-w-0 bg-white md:bg-slate-50 relative pb-16 md:pb-0 overflow-hidden">

                        <header className="h-16 flex items-center justify-between border-b border-slate-100 bg-white px-6 md:px-10 shrink-0">
                            <div>
                                <h2 className="text-sm font-black uppercase text-slate-800 tracking-tight">
                                    {activeTab === 'chat' ? 'Chat Inteligente' : activeTab === 'docs' ? 'Archivo Digital' : 'Mi Perfil'}
                                </h2>
                                <p className="text-[9px] font-black text-indigo-600 uppercase tracking-widest mt-0.5">Honduras Segundo Ciclo</p>
                            </div>
                        </header>

                        <div className="flex-1 overflow-hidden">

                            {/* ── PESTAÑA CHAT ── */}
                            {activeTab === 'chat' && (
                                <div className="flex flex-col h-full">
                                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scroll-container">

                                        {messages.length === 0 && (
                                            <div className="flex flex-col items-center justify-center py-20 text-center space-y-6">
                                                <div className="p-8 bg-indigo-50 text-indigo-600 rounded-[35px]">
                                                    <lucide-icon name="table" size="48"></lucide-icon>
                                                </div>
                                                <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Bienvenida, Directora</h3>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest max-w-xs">Estructura según DCNB de Honduras</p>
                                                <div className="grid grid-cols-1 gap-3 w-full max-w-sm">
                                                    {[
                                                        "Planificación de 4to grado — Matemáticas",
                                                        "Jornalización semanal de Español 5to",
                                                        "Actividades de evaluación para 6to"
                                                    ].map((sugg, i) => (
                                                        <button
                                                            key={i}
                                                            onClick={() => setInputText(sugg)}
                                                            className="bg-slate-50 hover:bg-indigo-50 border border-slate-200 hover:border-indigo-200 text-slate-600 hover:text-indigo-700 text-xs font-semibold px-4 py-3 rounded-2xl text-left transition-colors"
                                                        >
                                                            {sugg}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[95%] md:max-w-[85%] rounded-[28px] p-5 shadow-sm ${
                                                    m.role === 'user'
                                                        ? 'bg-indigo-600 text-white rounded-tr-none'
                                                        : 'bg-white border border-slate-100 text-slate-700'
                                                }`}>
                                                    {m.role === 'user'
                                                        ? <p className="text-sm">{m.text}</p>
                                                        : formatMessage(m.text)
                                                    }
                                                    {m.role === 'ai' && (
                                                        <div className="mt-6 pt-4 border-t border-slate-50 flex flex-wrap gap-2">
                                                            <button
                                                                onClick={() => handleDownload('WORD', m.text)}
                                                                className="bg-indigo-600 text-white px-3 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest shadow-md active:scale-95 transition-transform"
                                                            >
                                                                Descargar Word
                                                            </button>
                                                            <button
                                                                onClick={() => saveDoc(m.text)}
                                                                className="bg-slate-50 text-slate-500 border border-slate-200 px-3 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest active:scale-95 transition-transform"
                                                            >
                                                                Guardar
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}

                                        {isTyping && (
                                            <div className="text-[10px] font-black uppercase text-indigo-400 animate-pulse ml-2 tracking-widest">
                                                IA Procesando...
                                            </div>
                                        )}
                                    </div>

                                    {/* Input */}
                                    <div className="p-4 bg-white border-t border-slate-100">
                                        <div className="max-w-4xl mx-auto flex items-end gap-2 bg-slate-50 p-1.5 rounded-[22px] border border-slate-200">
                                            <textarea
                                                rows="1"
                                                value={inputText}
                                                onChange={e => setInputText(e.target.value)}
                                                placeholder="Ej: Planificación de 4to grado..."
                                                className="flex-1 border-none bg-transparent py-3 px-3 text-sm font-medium focus:ring-0 resize-none outline-none"
                                                onKeyDown={e => {
                                                    if (e.key === 'Enter' && !e.shiftKey) {
                                                        e.preventDefault();
                                                        handleSend();
                                                    }
                                                }}
                                            />
                                            <button
                                                onClick={handleSend}
                                                disabled={!inputText.trim()}
                                                className="rounded-2xl bg-indigo-600 p-3 text-white shadow-xl shadow-indigo-100 transition-all active:scale-90 disabled:opacity-40"
                                            >
                                                <lucide-icon name="send" size="18"></lucide-icon>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ── PESTAÑA BIBLIOTECA ── */}
                            {activeTab === 'docs' && (
                                <div className="flex h-full flex-col overflow-y-auto p-4 md:p-10 scroll-container">
                                    {savedDocs.length === 0 ? (
                                        <div className="flex flex-col items-center justify-center py-20 text-center space-y-4">
                                            <div className="p-6 bg-slate-100 text-slate-400 rounded-3xl">
                                                <lucide-icon name="archive" size="36"></lucide-icon>
                                            </div>
                                            <p className="text-xs font-black uppercase text-slate-400 tracking-widest">Biblioteca vacía</p>
                                            <p className="text-[10px] text-slate-300">Guarda tus planificaciones desde el chat</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 max-w-6xl mx-auto w-full">
                                            {savedDocs.map(d => (
                                                <div key={d.id} className="bg-white p-6 rounded-[35px] border border-slate-100 shadow-sm flex flex-col">
                                                    <div className="flex justify-between mb-4">
                                                        <div className="p-3 bg-indigo-50 text-indigo-600 rounded-2xl">
                                                            <lucide-icon name="file-check" size="24"></lucide-icon>
                                                        </div>
                                                        <button
                                                            onClick={() => deleteDoc(d.id)}
                                                            className="text-slate-200 hover:text-red-500 transition-colors"
                                                        >
                                                            <lucide-icon name="trash-2" size="20"></lucide-icon>
                                                        </button>
                                                    </div>
                                                    <h4 className="font-black text-xs uppercase text-slate-800 mb-6 truncate tracking-tighter">{d.title}</h4>
                                                    <button
                                                        onClick={() => handleDownload('WORD', d.content)}
                                                        className="w-full py-3 bg-indigo-600 text-white rounded-2xl text-[9px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all"
                                                    >
                                                        Exportar Word
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ── PESTAÑA PERFIL ── */}
                            {activeTab === 'profile' && (
                                <div className="flex h-full flex-col items-center justify-center p-6 overflow-y-auto scroll-container">
                                    <div className="w-full max-w-sm rounded-[45px] border border-slate-100 bg-white p-10 shadow-sm space-y-8">
                                        <div className="text-center">
                                            <div className="mx-auto mb-4 flex h-20 w-20 items-center justify-center rounded-3xl bg-indigo-50 text-indigo-600">
                                                <lucide-icon name="user" size="40"></lucide-icon>
                                            </div>
                                            <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tight leading-none">Mi Perfil</h3>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black uppercase text-indigo-400 ml-1">Firma Oficial</label>
                                                <input
                                                    className="w-full rounded-2xl bg-slate-50 border border-slate-200 p-4 text-sm font-bold focus:ring-4 focus:ring-indigo-100 outline-none transition-all"
                                                    value={teacherProfile.name}
                                                    onChange={e => setTeacherProfile({ ...teacherProfile, name: e.target.value })}
                                                    placeholder="Ej: Lic. María Hernández"
                                                />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black uppercase text-indigo-400 ml-1">Visión Pedagógica</label>
                                                <textarea
                                                    rows="3"
                                                    className="w-full rounded-2xl bg-slate-50 border border-slate-200 p-4 text-sm font-medium focus:ring-4 focus:ring-indigo-100 outline-none resize-none transition-all"
                                                    value={teacherProfile.vision}
                                                    onChange={e => setTeacherProfile({ ...teacherProfile, vision: e.target.value })}
                                                    placeholder="Escribe tu visión o contexto de enseñanza..."
                                                />
                                            </div>
                                            <button
                                                onClick={saveProfile}
                                                className="w-full rounded-[25px] bg-indigo-600 py-4 text-[10px] font-black uppercase text-white shadow-xl shadow-indigo-100 transition-all active:scale-95"
                                            >
                                                Guardar Perfil
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Navbar móvil */}
                        <nav className="md:hidden h-16 bg-white border-t border-slate-100 flex items-center justify-around px-4 fixed bottom-0 left-0 right-0 z-50">
                            {[
                                { id: 'chat',    icon: 'layout-dashboard', label: 'Chat' },
                                { id: 'docs',    icon: 'book-open',        label: 'Archivo' },
                                { id: 'profile', icon: 'user',             label: 'Perfil' }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex flex-col items-center gap-1 transition-colors ${
                                        activeTab === tab.id ? 'text-indigo-600' : 'text-slate-300'
                                    }`}
                                >
                                    <lucide-icon name={tab.icon} size="20"></lucide-icon>
                                    <span className="text-[8px] font-black uppercase tracking-widest">{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        {/* Overlay de exportación */}
                        {exporting && (
                            <div className="fixed inset-0 z-[999] flex flex-col items-center justify-center bg-white/90 backdrop-blur-md">
                                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-[9px] font-black uppercase text-indigo-600 tracking-widest">Procesando Documento...</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // Render con captura de errores global
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (e) {
            console.error("Critical Render Error:", e);
            document.getElementById('error-boundary').style.display = 'flex';
        }

        // Web Component para íconos Lucide
        class LucideIcon extends HTMLElement {
            connectedCallback() {
                const name = this.getAttribute('name');
                const size = this.getAttribute('size') || 24;
                const iconKey = name
                    .split('-')
                    .map(p => p.charAt(0).toUpperCase() + p.slice(1))
                    .join('');
                const icon = lucide.icons[iconKey] || lucide.icons[name.charAt(0).toUpperCase() + name.slice(1)];
                if (icon) {
                    this.innerHTML = icon.toSvg({ width: size, height: size });
                    this.style.display = 'inline-flex';
                    this.className = this.className + ' items-center justify-center';
                }
            }
        }
        customElements.define('lucide-icon', LucideIcon);
    </script>
</body>
</html>
