const SYSTEM = `Eres DocentePro, asistente pedagógico experto para una maestra y subdirectora hondureña innovadora, activa y creativa, que trabaja con el Segundo Ciclo de Educación Básica (4to, 5to y 6to grado) según el DCNB de Honduras.

const fileToBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result.split(',')[1]);
  r.onerror = rej;
  r.readAsDataURL(file);
});

const parseTables = (text) => {
  const lines = text.split('\n');
  const result = [];
  let tbl = [];

  const flushTbl = (key) => {
    const rows = tbl
      .filter(l => !l.match(/^\s*\|[-: |]+\|\s*$/))
      .map(l => l.split('|').filter((_,i,a) => i>0 && i<a.length-1).map(c => c.trim()));
    if (rows.length > 1) {
      result.push(
        <div key={key} className="my-3 overflow-x-auto rounded-2xl shadow-sm fade-up">
          <table className="ai-table">
            <thead><tr>{rows[0].map((h,i) => <th key={i}>{h}</th>)}</tr></thead>
            <tbody>{rows.slice(1).map((r,i) => <tr key={i}>{r.map((c,j) => <td key={j}>{c}</td>)}</tr>)}</tbody>
          </table>
        </div>
      );
    }
    tbl = [];
  };

  lines.forEach((line, i) => {
    if (line.trim().startsWith('|')) { tbl.push(line); return; }
    if (tbl.length) flushTbl('t'+i);
    if (!line.trim()) return;
    if (line.startsWith('###')) { result.push(<h4 key={i} className="font-black text-teal-700 text-sm mt-3 mb-1">{line.replace(/^#+\s*/,'')}</h4>); return; }
    if (line.startsWith('##'))  { result.push(<h3 key={i} className="font-black text-teal-800 text-base mt-3 mb-1">{line.replace(/^#+\s*/,'')}</h3>); return; }
    if (line.startsWith('#'))   { result.push(<h2 key={i} className="font-black text-teal-900 text-lg mt-3 mb-2">{line.replace(/^#+\s*/,'')}</h2>); return; }
    const html = line.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    result.push(<p key={i} className="text-sm text-slate-700 leading-relaxed mb-1" dangerouslySetInnerHTML={{__html:html}} />);
  });
  if (tbl.length) flushTbl('tlast');
  return result;
};

const exportWord = async (content, title='DocentePro') => {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, PageOrientation } = window.docx;
  const children = [];
  children.push(new Paragraph({ children:[new TextRun({text:title,bold:true,size:32,color:'0d9488'})], spacing:{after:300} }));
  const lines = content.split('\n');
  let tblLines = [];

  const flushDocTbl = () => {
    const rows = tblLines.filter(l=>!l.match(/^\s*\|[-: |]+\|\s*$/)).map(l=>l.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>c.trim()));
    if (rows.length>1) {
      children.push(new Table({ width:{size:100,type:WidthType.PERCENTAGE},
        rows: rows.map((r,ri)=>new TableRow({ children:r.map(c=>new TableCell({
          shading:ri===0?{fill:'0d9488'}:undefined,
          children:[new Paragraph({children:[new TextRun({text:c,bold:ri===0,color:ri===0?'FFFFFF':'000000',size:16})]})]
        }))}))
      }));
      children.push(new Paragraph({text:'',spacing:{after:200}}));
    }
    tblLines=[];
  };

  lines.forEach(line=>{
    if(line.trim().startsWith('|')){tblLines.push(line);return;}
    if(tblLines.length) flushDocTbl();
    if(!line.trim()) return;
    if(line.startsWith('#')) children.push(new Paragraph({children:[new TextRun({text:line.replace(/^#+\s*/,''),bold:true,size:22})],spacing:{before:200,after:100}}));
    else children.push(new Paragraph({children:[new TextRun({text:line,size:18})],spacing:{after:60}}));
  });
  if(tblLines.length) flushDocTbl();

  const doc = new Document({sections:[{properties:{page:{orientation:PageOrientation.LANDSCAPE}},children}]});
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=title+'.docx'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),100);
};

const SUGGESTIONS = [
  "📋 Plan de clase: Español 5to grado, comprensión lectora",
  "📊 Rúbrica para evaluar trabajo en equipo 4to grado",
  "📅 Jornalización semanal de Matemáticas 6to grado",
  "📝 Examen parcial de Ciencias Naturales 5to grado",
  "🎯 Actividades dinámicas para enseñar fracciones",
  "✏️ Revisar y mejorar este examen (adjunta el archivo)",
];

const App = () => {
  const [user,      setUser]      = useState(null);
  const [tab,       setTab]       = useState('chat');
  const [messages,  setMessages]  = useState([]);
  const [input,     setInput]     = useState('');
  const [loading,   setLoading]   = useState(false);
  const [exporting, setExporting] = useState(false);
  const [docs,      setDocs]      = useState([]);
  const [profile,   setProfile]   = useState({name:'',grade:'',school:''});
  const [toast,     setToast]     = useState(null);
  const [attach,    setAttach]    = useState(null);
  const [dragging,  setDragging]  = useState(false);
  const scrollRef = useRef(null);
  const fileRef   = useRef(null);
  const textRef   = useRef(null);

  useEffect(()=>{ auth.onAuthStateChanged(u=>{ if(u) setUser(u); else auth.signInAnonymously(); }); },[]);

  useEffect(()=>{
    if(!user) return;
    const base = ()=>db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid);
    base().collection('settings').doc('profile').get().then(d=>{ if(d.exists) setProfile(d.data()); });
    return base().collection('docs').orderBy('createdAt','desc').onSnapshot(s=>setDocs(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[user]);

  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight; },[messages,loading]);

  const toast$ = (msg, color='bg-teal-600') => { setToast({msg,color}); setTimeout(()=>setToast(null),3000); };

  const sendMessage = async () => {
    const text = input.trim();
    if(!text && !attach) return;
    setMessages(p=>[...p,{role:'user',text:attach?`${text}\n\n📎 ${attach.name}`:text}]);
    setInput(''); setLoading(true);
    if(textRef.current){ textRef.current.style.height='auto'; }

    try {
      const parts = [];
      if(text) parts.push({text});
      if(attach) {
        if(['application/pdf','image/png','image/jpeg','image/webp'].includes(attach.mimeType))
          parts.push({inline_data:{mime_type:attach.mimeType,data:attach.base64}});
        else
          parts.push({text:`[Archivo adjunto: ${attach.name} — úsalo como contexto para tu respuesta]`});
      }

      const history = messages.slice(-8).map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.text}]}));
      const sysExtra = (profile.name?`\nMaestra: ${profile.name}`:'')+(profile.grade?`\nGrado: ${profile.grade}`:'')+(profile.school?`\nEscuela: ${profile.school}`:'');

      const res = await fetch(GEMINI_URL,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          system_instruction:{parts:[{text:SYSTEM+sysExtra}]},
          contents:[...history,{role:'user',parts}]
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);
      const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No pude generar respuesta.';
      setMessages(p=>[...p,{role:'ai',text:aiText}]);
    } catch(e) {
      setMessages(p=>[...p,{role:'ai',text:'⚠️ Error: '+e.message}]);
    } finally {
      setLoading(false); setAttach(null);
    }
  };

  const handleFile = async (file) => {
    if(!file) return;
    if(file.size>10_000_000){toast$('Archivo muy grande (máx 10MB)','bg-rose-500');return;}
    const ok=['application/pdf','image/png','image/jpeg','image/webp'];
    const base64 = await fileToBase64(file);
    setAttach({name:file.name,base64,mimeType:ok.includes(file.type)?file.type:'text/plain'});
    toast$('✓ '+file.name+' adjuntado');
  };

  const saveDoc = (text) => {
    if(!user) return;
    const title = text.split('\n').find(l=>l.trim()&&!l.startsWith('|'))?.replace(/^#+\s*/,'').slice(0,60)||'Plan '+new Date().toLocaleDateString();
    db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('docs').add({title,content:text,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast$('✓ Guardado en Biblioteca');
  };

  const onDrop = useCallback(async(e)=>{ e.preventDefault(); setDragging(false); const f=e.dataTransfer.files[0]; if(f) await handleFile(f); },[]);

  return (
    <div className="flex h-screen flex-col md:flex-row overflow-hidden"
      onDragOver={e=>{e.preventDefault();setDragging(true)}}
      onDragLeave={()=>setDragging(false)} onDrop={onDrop}>

      {toast && <div className={`fixed top-5 left-1/2 -translate-x-1/2 z-[9999] ${toast.color} text-white px-5 py-2.5 rounded-full text-xs font-bold shadow-xl fade-up`}>{toast.msg}</div>}

      {dragging && (
        <div className="fixed inset-0 z-[9998] bg-teal-600/30 backdrop-blur-sm flex items-center justify-center">
          <div className="bg-white rounded-3xl p-10 text-center shadow-2xl">
            <div className="text-5xl mb-3">📂</div>
            <p className="font-black text-teal-700 text-lg">Suelta el archivo aquí</p>
          </div>
        </div>
      )}

      {/* Sidebar desktop */}
      <aside className="hidden md:flex w-68 flex-col bg-white border-r border-teal-100 p-7" style={{minWidth:'260px'}}>
        <div className="flex items-center gap-3 mb-8">
          <div className="w-10 h-10 bg-gradient-to-br from-teal-500 to-teal-700 rounded-2xl flex items-center justify-center text-white text-xl font-black shadow-lg">✦</div>
          <div>
            <h1 className="font-black text-slate-800 text-lg leading-none" style={{fontFamily:'Outfit,sans-serif'}}>DocentePro</h1>
            <p className="text-[10px] text-teal-500 font-bold uppercase tracking-widest">Asistente Pedagógico</p>
          </div>
        </div>

        {profile.name && (
          <div className="mb-6 bg-teal-50 rounded-2xl p-4 border border-teal-100">
            <p className="text-[9px] text-teal-500 font-bold uppercase tracking-wider mb-1">Bienvenida</p>
            <p className="font-black text-teal-800 text-sm">{profile.name}</p>
            {profile.grade  && <p className="text-xs text-slate-500 mt-0.5">{profile.grade}</p>}
            {profile.school && <p className="text-xs text-slate-400">{profile.school}</p>}
          </div>
        )}

        <nav className="space-y-1 flex-1">
          {[{id:'chat',icon:'💬',label:'Chat con IA'},{id:'docs',icon:'📚',label:'Biblioteca'},{id:'profile',icon:'👩‍🏫',label:'Mi Perfil'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-bold transition-all ${tab===t.id?'bg-teal-600 text-white shadow-lg shadow-teal-200':'text-slate-500 hover:bg-teal-50 hover:text-teal-700'}`}>
              <span>{t.icon}</span>{t.label}
            </button>
          ))}
        </nav>

        <div className="mt-6 bg-amber-50 rounded-2xl p-4 text-xs text-amber-700 font-semibold border border-amber-100">
          💡 <strong>DCNB 2do Ciclo</strong><br/>4to · 5to · 6to grado · Honduras
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 flex flex-col min-w-0 overflow-hidden pb-14 md:pb-0">
        <header className="h-14 flex items-center justify-between bg-white border-b border-teal-50 px-4 shrink-0 shadow-sm">
          <div className="flex items-center gap-3">
            <div className="md:hidden w-8 h-8 bg-gradient-to-br from-teal-500 to-teal-700 rounded-xl flex items-center justify-center text-white text-sm font-black">✦</div>
            <div>
              <h2 className="font-black text-slate-800 text-sm leading-none" style={{fontFamily:'Outfit,sans-serif'}}>
                {tab==='chat'?'Chat Inteligente':tab==='docs'?'Mi Biblioteca':'Mi Perfil'}
              </h2>
              <p className="text-[9px] text-teal-500 font-bold uppercase tracking-widest">DCNB Honduras · 2do Ciclo</p>
            </div>
          </div>
          {tab==='chat' && (
            <button onClick={()=>fileRef.current?.click()}
              className="flex items-center gap-1.5 bg-teal-50 hover:bg-teal-100 text-teal-700 text-xs font-bold px-3 py-2 rounded-xl transition-colors">
              📎 Adjuntar PDF
            </button>
          )}
          <input ref={fileRef} type="file" className="hidden" accept=".pdf,.png,.jpg,.jpeg,.webp,.pptx"
            onChange={e=>handleFile(e.target.files[0])} />
        </header>

        {/* TAB CHAT */}
        {tab==='chat' && (
          <div className="flex-1 flex flex-col overflow-hidden">
            <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 scroll-hide">
              {messages.length===0 && (
                <div className="flex flex-col items-center pt-6 pb-4 text-center fade-up">
                  <div className="text-5xl mb-4">👩‍🏫</div>
                  <h3 className="font-black text-slate-800 text-xl mb-1" style={{fontFamily:'Outfit,sans-serif'}}>
                    {profile.name?`¡Hola, ${profile.name.split(' ')[0]}!`:'¡Bienvenida, Maestra!'}
                  </h3>
                  <p className="text-slate-500 text-sm mb-5 max-w-xs">Soy tu asistente pedagógico. Puedo crear planes, rúbricas, jornalizaciones, exámenes y más.</p>
                  <div className="w-full max-w-md space-y-2">
                    {SUGGESTIONS.map((s,i)=>(
                      <button key={i} onClick={()=>setInput(s.replace(/^.\s/,''))}
                        className="w-full text-left bg-white hover:bg-teal-50 border border-teal-100 hover:border-teal-300 text-slate-600 hover:text-teal-700 text-xs font-semibold px-4 py-3 rounded-2xl transition-all shadow-sm">
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {messages.map((m,i)=>(
                <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'} fade-up`}>
                  {m.role==='ai' && <div className="w-7 h-7 bg-teal-600 rounded-full flex items-center justify-center text-white text-xs mr-2 mt-1 shrink-0">✦</div>}
                  <div className={`max-w-[92%] md:max-w-[80%] rounded-3xl px-4 py-4 shadow-sm ${m.role==='user'?'bg-teal-600 text-white rounded-tr-sm':'bg-white border border-teal-50 rounded-tl-sm'}`}>
                    {m.role==='user'
                      ? <p className="text-sm leading-relaxed whitespace-pre-wrap">{m.text}</p>
                      : <div>{parseTables(m.text)}</div>
                    }
                    {m.role==='ai' && (
                      <div className="mt-4 pt-3 border-t border-teal-50 flex flex-wrap gap-2">
                        <button onClick={async()=>{setExporting(true);await exportWord(m.text);setExporting(false);}}
                          className="bg-teal-600 hover:bg-teal-700 text-white text-[9px] font-black uppercase tracking-widest px-3 py-2 rounded-xl transition-all active:scale-95 shadow-md">
                          💾 Descargar Word
                        </button>
                        <button onClick={()=>saveDoc(m.text)}
                          className="bg-slate-50 hover:bg-slate-100 text-slate-500 text-[9px] font-black uppercase tracking-widest px-3 py-2 rounded-xl transition-all active:scale-95 border border-slate-200">
                          📌 Guardar
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              ))}

              {loading && (
                <div className="flex items-center gap-2 fade-up">
                  <div className="w-7 h-7 bg-teal-600 rounded-full flex items-center justify-center text-white text-xs shrink-0">✦</div>
                  <div className="bg-white border border-teal-50 rounded-3xl rounded-tl-sm px-5 py-4 shadow-sm">
                    <span className="dots text-teal-400 text-lg font-black"><span>•</span><span>•</span><span>•</span></span>
                  </div>
                </div>
              )}
            </div>

            {attach && (
              <div className="mx-4 mb-1 flex items-center gap-2 bg-teal-50 border border-teal-200 rounded-2xl px-4 py-2">
                <span>📎</span>
                <span className="text-xs font-bold text-teal-700 flex-1 truncate">{attach.name}</span>
                <button onClick={()=>setAttach(null)} className="text-slate-400 hover:text-rose-500 font-black text-xs">✕</button>
              </div>
            )}

            <div className="p-3 bg-white border-t border-teal-50">
              <div className="max-w-3xl mx-auto flex items-end gap-2 bg-slate-50 rounded-[20px] border border-slate-200 p-1.5">
                <textarea ref={textRef} rows={1} value={input}
                  onChange={e=>setInput(e.target.value)}
                  placeholder="Escribe tu solicitud… o adjunta un PDF"
                  className="flex-1 bg-transparent border-none outline-none resize-none py-2.5 px-2 text-sm font-medium text-slate-700 placeholder:text-slate-400"
                  style={{maxHeight:'120px'}}
                  onInput={e=>{e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px'}}
                  onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}}
                />
                <button onClick={sendMessage} disabled={!input.trim()&&!attach}
                  className="w-10 h-10 bg-teal-600 hover:bg-teal-700 disabled:opacity-40 text-white rounded-[14px] flex items-center justify-center transition-all active:scale-90 shadow-lg shadow-teal-200 shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
                </button>
              </div>
            </div>
          </div>
        )}

        {/* TAB BIBLIOTECA */}
        {tab==='docs' && (
          <div className="flex-1 overflow-y-auto p-4 scroll-hide">
            {docs.length===0 ? (
              <div className="flex flex-col items-center justify-center py-20 text-center">
                <div className="text-5xl mb-4">📚</div>
                <p className="font-black text-slate-400 text-sm">Biblioteca vacía</p>
                <p className="text-slate-300 text-xs mt-1">Guarda tus planificaciones desde el chat</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-w-5xl mx-auto">
                {docs.map(d=>(
                  <div key={d.id} className="bg-white rounded-3xl border border-teal-50 shadow-sm p-5 flex flex-col gap-4 hover:shadow-md transition-shadow">
                    <div className="flex items-start justify-between">
                      <div className="w-10 h-10 bg-teal-50 rounded-2xl flex items-center justify-center text-xl">📄</div>
                      <button onClick={()=>{if(confirm('¿Eliminar?'))db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('docs').doc(d.id).delete();}}
                        className="text-slate-200 hover:text-rose-400 transition-colors text-lg">✕</button>
                    </div>
                    <p className="font-black text-slate-700 text-xs uppercase tracking-tight line-clamp-2">{d.title}</p>
                    <div className="flex gap-2 mt-auto">
                      <button onClick={async()=>{setExporting(true);await exportWord(d.content,d.title);setExporting(false);}}
                        className="flex-1 bg-teal-600 hover:bg-teal-700 text-white text-[9px] font-black uppercase tracking-widest py-2.5 rounded-xl transition-all active:scale-95">
                        💾 Word
                      </button>
                      <button onClick={()=>{setMessages([{role:'ai',text:d.content}]);setTab('chat');}}
                        className="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-500 text-[9px] font-black uppercase tracking-widest py-2.5 rounded-xl transition-all active:scale-95 border border-slate-200">
                        👁 Ver
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* TAB PERFIL */}
        {tab==='profile' && (
          <div className="flex-1 overflow-y-auto p-4 scroll-hide flex items-start justify-center">
            <div className="w-full max-w-sm bg-white rounded-[32px] border border-teal-50 shadow-sm p-8 mt-4">
              <div className="text-center mb-7">
                <div className="w-20 h-20 bg-gradient-to-br from-teal-400 to-teal-700 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-3 shadow-lg shadow-teal-200">👩‍🏫</div>
                <h3 className="font-black text-slate-800 text-xl" style={{fontFamily:'Outfit,sans-serif'}}>Mi Perfil</h3>
                <p className="text-xs text-slate-400 mt-1">La IA aprende de tu contexto</p>
              </div>
              <div className="space-y-4">
                {[
                  {key:'name',  label:'Tu nombre completo',    ph:'Ej: Lic. María González'},
                  {key:'grade', label:'Grado(s) que impartes', ph:'Ej: 4to, 5to y 6to grado'},
                  {key:'school',label:'Nombre de tu escuela',  ph:'Ej: Escuela República de México'},
                ].map(f=>(
                  <div key={f.key}>
                    <label className="text-[10px] font-black uppercase text-teal-500 tracking-wider block mb-1">{f.label}</label>
                    <input className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-teal-300 transition-all placeholder:text-slate-300"
                      value={profile[f.key]||''}
                      onChange={e=>setProfile(p=>({...p,[f.key]:e.target.value}))}
                      placeholder={f.ph} />
                  </div>
                ))}
                <button onClick={()=>{
                  db.collection('artifacts').doc(APP_ID).collection('users').doc(user?.uid).collection('settings').doc('profile').set(profile);
                  toast$('✓ Perfil guardado');
                }} className="w-full bg-teal-600 hover:bg-teal-700 text-white font-black text-sm py-4 rounded-2xl shadow-lg shadow-teal-200 transition-all active:scale-95 mt-2">
                  Guardar Perfil
                </button>
              </div>
            </div>
          </div>
        )}
      </main>

      {/* Navbar móvil */}
      <nav className="md:hidden fixed bottom-0 left-0 right-0 h-14 bg-white border-t border-teal-50 flex items-center justify-around z-50 shadow-lg">
        {[{id:'chat',icon:'💬',label:'Chat'},{id:'docs',icon:'📚',label:'Archivo'},{id:'profile',icon:'👩‍🏫',label:'Perfil'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex flex-col items-center gap-0.5 transition-colors ${tab===t.id?'text-teal-600':'text-slate-300'}`}>
            <span className="text-xl">{t.icon}</span>
            <span className="text-[8px] font-black uppercase tracking-widest">{t.label}</span>
          </button>
        ))}
      </nav>

      {exporting && (
        <div className="fixed inset-0 z-[9999] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center">
          <div className="w-12 h-12 border-4 border-teal-600 border-t-transparent rounded-full animate-spin mb-3"></div>
          <p className="text-xs font-black uppercase text-teal-600 tracking-widest">Generando documento…</p>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
